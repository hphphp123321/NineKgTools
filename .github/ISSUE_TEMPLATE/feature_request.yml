name: ✨ 功能建议
description: 提出一个新功能或改进想法
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出想法！清晰的"为什么"往往比"要做什么"更关键。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前检查
      options:
        - label: 我已经搜索过 [现有 Issues](../../issues?q=is%3Aissue)，没有类似建议
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你遇到了什么问题？
      description: 描述现状与痛点（而不是直接描述解决方案）
      placeholder: 目前识别失败后只能一个个重试，批量有几十条时很累…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的方案
      description: 你希望怎么解决？越具体越好（UI 草图、API 设想、配置项名等）
      placeholder: 在 /source/pending 页加一个"重试全部失败项"按钮…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有用现有功能凑合过？为什么不理想？
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围（估计）
      options:
        - 只影响我一个人的 workflow
        - 大多数用户会受益
        - 跨领域改进（UI/API/部署）
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: 你愿意为此提 PR 吗？
      options:
        - 愿意，需要指导
        - 愿意，已经有思路
        - 暂时没空，但欢迎他人接手
        - 仅建议
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、参考链接、其他上下文
    validations:
      required: false
