name: Screenshots

# 手动触发（Actions 页面 → "Run workflow"，或 `gh workflow run screenshots.yml`）
# 跑完会自动 commit 刷新的 PNG 回 main，commit message 带 [skip ci] 防递归
#
# 触发条件刻意只放手动：
#   - 不放 cron（避免每次跑出渲染抖动 1-2px 推回去刷屏 git 历史）
#   - 不放 path filter（同上，且 UI 改动跟截图刷新需求不一定 1:1）
#   - 真要刷新时，UI 改完后开发者自己点一下 Run workflow

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '基于哪个分支 / tag 跑（默认 main）'
        required: false
        default: 'main'

permissions:
  contents: write   # 需要 push 刷新截图回仓库

concurrency:
  group: screenshots
  cancel-in-progress: false

jobs:
  capture:
    name: Capture & commit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # persist-credentials 默认 true，后续 git push 走 GITHUB_TOKEN
          # GitHub 内置防递归：用 GITHUB_TOKEN push 不会再触发 workflow

      - name: Install CJK fonts
        # ubuntu-latest 默认没装中文字体，截图里中文会渲染成豆腐块
        # noto-cjk 跟 Windows 微软雅黑形状不同，截图风格会变（可接受）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -f

      - name: Setup .NET (read version from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/screenshots/package-lock.json

      - name: Install npm deps
        working-directory: scripts/screenshots
        run: npm ci

      - name: Install Chromium (with system deps)
        working-directory: scripts/screenshots
        run: npx playwright install --with-deps chromium

      - name: Run capture
        working-directory: scripts/screenshots
        env:
          # 截图只需要 UI 渲染，AI 接口不会被调用——给占位值避免 OpenaiService 启动检查报错
          OPENAI_API_KEY: sk-dummy-for-screenshots
          # 跳过 HTTPS 重定向警告（容器里没配置 https）
          ASPNETCORE_HTTPS_PORT: ''
        run: npm run capture

      - name: Stage updated PNGs
        id: changes
        run: |
          git add docs/assets/screenshots/*.png
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::所有截图与现有版本逐字节相同，无需 commit"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "----- staged diff -----"
            git diff --cached --stat
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m "$(printf 'Refresh screenshots [skip ci]\n\nGenerated by .github/workflows/screenshots.yml at %s UTC\nTriggered by %s (run #%s)' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "${{ github.actor }}" \
            "${{ github.run_number }}")"
          git push origin HEAD:${{ inputs.ref || 'main' }}

      - name: Upload screenshots as artifact
        # 不管有没有 commit 都上传，方便审查 / debug 截图渲染
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-run-${{ github.run_number }}
          path: docs/assets/screenshots/*.png
          retention-days: 14
