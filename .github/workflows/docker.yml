name: Docker

# 触发：
#   - tag 形如 v* 时自动推
#   - 手动从 Actions 页面触发（紧急修复或 staging 测试）
#
# 镜像名约定：ghcr.io/hphphp123321/nine-kg-tools
# tag：latest（仅 default branch）+ semver（v1.2.3 → 1.2.3 / 1.2 / 1）+ sha-<7>

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定要推的 tag（默认 latest-dev）'
        required: false
        default: 'latest-dev'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nine-kg-tools

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        # GHCR 要求镜像 path 全小写；如果用户名含大写需要转一下
        id: lower
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch fallback)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.name }}
          tags: |
            # 语义化版本：v1.2.3 → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # 仅 main 分支或 tag 时打 latest
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # 工作流手动触发时用输入
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            # commit sha 短版（便于追溯具体来源）
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          # arm64 v1.1+ 再开（构建时间增 ~2x）
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false  # 关掉 attestation 减少 GHCR 上的 unknown/unknown 条目
